<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riepilogo Anno – Gestione Turni</title>
<style>
  :root { --bg:#0F172A; --card:#1E293B; --card2:#263348; --border:#334155; --text:#E2E8F0; --muted:#94A3B8; --accent:#3B82F6; --radius:10px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

  header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:1.2rem; font-weight:700; }
  header h1 span { color:var(--accent); }
  nav { display:flex; gap:4px; }
  nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; padding:6px 14px; border-radius:8px; background:var(--card2); }
  nav a:hover { color:var(--text); }
  .header-right { display:flex; align-items:center; gap:10px; margin-left:auto; }
  .user-label { font-size:0.85rem; color:var(--muted); }
  .btn-logout { background:rgba(239,68,68,.15); color:#FCA5A5; border:1px solid rgba(239,68,68,.3); border-radius:8px; padding:6px 14px; font-size:0.85rem; cursor:pointer; }
  .btn-logout:hover { background:#EF4444; color:white; }

  .nav-controls { display:flex; align-items:center; gap:8px; }
  .nav-controls select, .nav-controls button { background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:6px 14px; font-size:0.9rem; cursor:pointer; }
  .nav-controls button:hover { background:var(--accent); border-color:var(--accent); }

  .container { padding:24px; overflow-x:auto; }

  /* ── TABELLA RIEPILOGO ── */
  .riepilogo-table { width:100%; border-collapse:collapse; min-width:900px; }

  .riepilogo-table th {
    background:var(--card2); color:var(--muted); font-size:0.72rem;
    font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    padding:10px 10px; text-align:center; position:sticky; top:0; z-index:2;
    border:1px solid var(--border);
  }
  .riepilogo-table th.label-col { text-align:left; min-width:160px; }
  .riepilogo-table th.mese-col { min-width:72px; }
  .riepilogo-table th.tot-col { background:#1E3A5F; color:#93C5FD; min-width:80px; }

  .riepilogo-table td {
    padding:8px 10px; border:1px solid var(--border);
    font-size:0.82rem; text-align:center; font-variant-numeric:tabular-nums;
  }
  .riepilogo-table td.label-col {
    text-align:left; font-weight:600; color:var(--muted);
    background:var(--card); font-size:0.8rem; position:sticky; left:0; z-index:1;
  }
  .riepilogo-table td.tot-col { background:#172033; color:#60A5FA; font-weight:700; }
  .riepilogo-table td.zero { color:var(--border); }

  /* Sezioni della tabella */
  .riepilogo-table tr.section-header td {
    background:var(--card2); color:var(--accent); font-weight:700;
    font-size:0.75rem; text-transform:uppercase; letter-spacing:.06em;
    padding:12px 10px;
  }
  .riepilogo-table tr.section-header td.label-col {
    background:var(--card2); color:var(--accent);
  }

  /* Riga totali */
  .riepilogo-table tr.total-row td {
    background:rgba(59,130,246,0.08); font-weight:700; color:var(--text);
  }
  .riepilogo-table tr.total-row td.label-col {
    background:rgba(59,130,246,0.12); color:var(--accent);
  }
  .riepilogo-table tr.total-row td.tot-col {
    background:rgba(59,130,246,0.2); color:#60A5FA;
  }

  /* Colori valori */
  .v-blue   { color:#60A5FA; }
  .v-purple { color:#A78BFA; }
  .v-yellow { color:#F59E0B; }
  .v-pink   { color:#EC4899; }
  .v-green  { color:#34D399; }
  .v-red    { color:#F87171; }
  .v-teal   { color:#2DD4BF; }

  /* Mese corrente evidenziato */
  .riepilogo-table td.mese-corrente { background:rgba(59,130,246,0.06); }
  .riepilogo-table th.mese-corrente { background:#1E3A5F; color:#93C5FD; }

  .loading { text-align:center; padding:80px; color:var(--muted); font-size:1rem; }

  @media (max-width: 768px) {
    header { padding: 10px 14px; gap: 8px; flex-wrap: wrap; }
    header h1 { font-size: 1rem; }
    nav { display: none; }
    .header-right { gap: 6px; }
    .user-label { display: none; }
    .btn-logout { padding: 5px 10px; font-size: 0.78rem; }
    .nav-controls { gap: 6px; }
    .nav-controls select, .nav-controls button { padding: 5px 10px; font-size: 0.8rem; }
    .container { padding: 12px; }
    .fields-grid { grid-template-columns: 1fr !important; }
    table { font-size: 0.75rem; }
    th, td { padding: 6px 5px; }
    .busta-info { grid-template-columns: 1fr 1fr !important; }
    .ore-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .fiscal-grid { grid-template-columns: 1fr 1fr !important; }
    .netto-card { flex-direction: column; gap: 8px; text-align: center; }
    .netto-val { font-size: 1.8rem; }
    .riepilogo-table { font-size: 0.7rem; }
    .card { padding: 24px 18px; }
  }

  .bottom-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 8px 0 env(safe-area-inset-bottom, 8px);
  }
  .bottom-nav-inner { display: flex; justify-content: space-around; }
  .bottom-nav a {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    color: var(--muted); text-decoration: none; font-size: 0.65rem;
    font-weight: 600; padding: 4px 12px; border-radius: 8px;
  }
  .bottom-nav a.active { color: var(--accent); }
  .bottom-nav a span.icon { font-size: 1.3rem; line-height: 1; }
  @media (max-width: 768px) {
    .bottom-nav { display: block; }
    body { padding-bottom: 70px; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 Riepilogo <span>Annuale</span></h1>
  <nav>
    <a href="/">📅 Calendario</a>
    <a href="/bustapaga.html">💶 Busta Paga</a>
    <a href="/impostazioni.html">⚙️ Impostazioni</a>
  </nav>
  <div class="header-right">
    <div class="nav-controls">
      <button onclick="changeAnno(-1)">◀</button>
      <select id="selAnno" onchange="load()"></select>
      <button onclick="changeAnno(1)">▶</button>
    </div>
    <span class="user-label"></span>
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>
</header>

<div class="container">
  <div id="body" class="loading">Caricamento…</div>
</div>

<script>
const MESI = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
let anno = new Date().getFullYear();
const meseCorrente = new Date().getMonth() + 1;

// ── INIT ────────────────────────────────────────────────────────────────────
function initSelAnno() {
  const sel = document.getElementById('selAnno');
  for (let y = 2024; y <= 2030; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === anno) o.selected = true;
    sel.appendChild(o);
  }
  sel.onchange = () => { anno = parseInt(sel.value); load(); };
}

function changeAnno(d) {
  anno = parseInt(document.getElementById('selAnno').value) + d;
  document.getElementById('selAnno').value = anno;
  load();
}

function fmtH(h) {
  if (!h) return null;
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${hh}:${String(mm).padStart(2,'0')}`;
}

function cell(val, cls = '') {
  if (val === null || val === undefined || val === 0 || val === '0:00')
    return `<td class="zero ${cls}">—</td>`;
  return `<td class="${cls}">${val}</td>`;
}

function cellH(val, colorCls = '', extraCls = '') {
  const f = fmtH(val);
  if (!f || val === 0) return `<td class="zero ${extraCls}">—</td>`;
  return `<td class="${colorCls} ${extraCls}">${f}</td>`;
}

function cellN(val, colorCls = '', extraCls = '') {
  if (!val || val === 0) return `<td class="zero ${extraCls}">—</td>`;
  return `<td class="${colorCls} ${extraCls}">${val}</td>`;
}

// ── CARICA DATI ──────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Caricamento…</div>';
  const data = await fetch(`/api/riepilogo/${anno}`).then(r => r.json());
  render(data);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(data) {
  const mesiCols = MESI.map((m, i) => {
    const isCurr = (i + 1 === meseCorrente) && (anno === new Date().getFullYear());
    return { label: m, idx: i + 1, curr: isCurr };
  });

  // Calcola totali annuali
  const tot = {};
  const campi = ['ore_diurne','ore_notturne','strao_diurno','strao_notturno',
                 'strao_fest_diurno','strao_fest_notturno',
                 'reperibilita_feriale','reperibilita_semifestiva','reperibilita_festiva',
                 'mal','ferie','rc','r','rot','rf'];
  for (const c of campi) {
    tot[c] = Object.values(data).reduce((s, m) => s + (m[c] || 0), 0);
  }
  tot.ore_tot     = tot.ore_diurne + tot.ore_notturne;
  tot.strao_fer   = tot.strao_diurno + tot.strao_notturno;
  tot.strao_fest  = tot.strao_fest_diurno + tot.strao_fest_notturno;
  tot.strao_tot   = tot.strao_fer + tot.strao_fest;
  tot.rep_tot     = tot.reperibilita_feriale + tot.reperibilita_semifestiva + tot.reperibilita_festiva;

  // Per ogni mese calcola i subtotali
  function m(idx) { return data[idx] || {}; }
  function mOreOrd(idx) { return (m(idx).ore_diurne||0) + (m(idx).ore_notturne||0); }
  function mStraoFer(idx) { return (m(idx).strao_diurno||0) + (m(idx).strao_notturno||0); }
  function mStraoFest(idx) { return (m(idx).strao_fest_diurno||0) + (m(idx).strao_fest_notturno||0); }
  function mStraoTot(idx) { return mStraoFer(idx) + mStraoFest(idx); }
  function mRepTot(idx) { return (m(idx).reperibilita_feriale||0)+(m(idx).reperibilita_semifestiva||0)+(m(idx).reperibilita_festiva||0); }

  const mc = (idx) => mesiCols[idx-1].curr ? 'mese-corrente' : '';

  // Header mesi
  const thMesi = mesiCols.map(m =>
    `<th class="mese-col ${m.curr ? 'mese-corrente' : ''}">${m.label}</th>`
  ).join('');

  const html = `
  <table class="riepilogo-table">
    <thead>
      <tr>
        <th class="label-col">Voce</th>
        ${thMesi}
        <th class="tot-col">Totale</th>
      </tr>
    </thead>
    <tbody>

      <!-- ORE ORDINARIE -->
      <tr class="section-header">
        <td class="label-col">⏱ Ore Ordinarie</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr>
        <td class="label-col">Totale ordinario</td>
        ${mesiCols.map(({idx}) => cellH(mOreOrd(idx), 'v-blue', mc(idx))).join('')}
        ${cellH(tot.ore_diurne + tot.ore_notturne, 'v-blue', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Diurne</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).ore_diurne, '', mc(idx))).join('')}
        ${cellH(tot.ore_diurne, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Notturne</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).ore_notturne, 'v-purple', mc(idx))).join('')}
        ${cellH(tot.ore_notturne, 'v-purple', 'tot-col')}
      </tr>

      <!-- STRAORDINARI -->
      <tr class="section-header">
        <td class="label-col">⚡ Straordinari</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr class="total-row">
        <td class="label-col">Totale straordinari</td>
        ${mesiCols.map(({idx}) => cellH(mStraoTot(idx), 'v-yellow', mc(idx))).join('')}
        ${cellH(tot.strao_tot, 'v-yellow', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Feriale diurno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_diurno, '', mc(idx))).join('')}
        ${cellH(tot.strao_diurno, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Feriale notturno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_notturno, 'v-purple', mc(idx))).join('')}
        ${cellH(tot.strao_notturno, 'v-purple', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Festivo diurno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_fest_diurno, 'v-pink', mc(idx))).join('')}
        ${cellH(tot.strao_fest_diurno, 'v-pink', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Festivo notturno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_fest_notturno, 'v-pink', mc(idx))).join('')}
        ${cellH(tot.strao_fest_notturno, 'v-pink', 'tot-col')}
      </tr>

      <!-- REPERIBILITÀ -->
      <tr class="section-header">
        <td class="label-col">🔔 Reperibilità</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr class="total-row">
        <td class="label-col">Totale reperibilità</td>
        ${mesiCols.map(({idx}) => cellN(mRepTot(idx), 'v-green', mc(idx))).join('')}
        ${cellN(tot.rep_tot, 'v-green', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">🔵 Feriale</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).reperibilita_feriale, '', mc(idx))).join('')}
        ${cellN(tot.reperibilita_feriale, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">🟡 Semi-festiva</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).reperibilita_semifestiva, '', mc(idx))).join('')}
        ${cellN(tot.reperibilita_semifestiva, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">🔴 Festiva</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).reperibilita_festiva, '', mc(idx))).join('')}
        ${cellN(tot.reperibilita_festiva, '', 'tot-col')}
      </tr>

      <!-- ASSENZE -->
      <tr class="section-header">
        <td class="label-col">📋 Assenze (giorni)</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr>
        <td class="label-col">Ferie</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).ferie, 'v-teal', mc(idx))).join('')}
        ${cellN(tot.ferie, 'v-teal', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">Malattia</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).mal, 'v-red', mc(idx))).join('')}
        ${cellN(tot.mal, 'v-red', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">Riposo Comp. (RC)</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).rc, '', mc(idx))).join('')}
        ${cellN(tot.rc, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">Riposo Dom. (R)</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).r, '', mc(idx))).join('')}
        ${cellN(tot.r, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">Rid. Orario (ROT)</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).rot, '', mc(idx))).join('')}
        ${cellN(tot.rot, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">Riposo Festivo (RF)</td>
        ${mesiCols.map(({idx}) => cellN(m(idx).rf, '', mc(idx))).join('')}
        ${cellN(tot.rf, '', 'tot-col')}
      </tr>

    </tbody>
  </table>`;

  document.getElementById('body').innerHTML = html;
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function getToken()  { return localStorage.getItem('token'); }
function getNome()   { return localStorage.getItem('nome') || localStorage.getItem('username') || ''; }
function logout()    { localStorage.removeItem('token'); localStorage.removeItem('username'); localStorage.removeItem('nome'); window.location.href='/login.html'; }

const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts={}) {
  const token = getToken();
  if (token && typeof url === 'string' && url.startsWith('/api/')) {
    opts.headers = { ...(opts.headers||{}), 'Authorization': 'Bearer ' + token };
  }
  return _origFetch(url, opts).then(res => {
    if (res.status === 401 && typeof url === 'string' && url.startsWith('/api/')) {
      logout(); throw new Error('Non autorizzato');
    }
    return res;
  });
};

(async function() {
  if (!getToken()) { window.location.href='/login.html'; return; }
  try {
    await fetch('/api/auth/me').then(r => { if(!r.ok) throw new Error(); return r.json(); });
    document.querySelectorAll('.user-label').forEach(el => el.textContent = '👤 ' + getNome());
    initSelAnno();
    load();
  } catch(e) { logout(); }
})();
</script>
<nav class="bottom-nav"><div class="bottom-nav-inner">
    <a href="/"><span class="icon">🗓</span><span>Turni</span></a>
    <a href="/riepilogo.html" class="active"><span class="icon">📊</span><span>Riepilogo</span></a>
    <a href="/bustapaga.html"><span class="icon">💶</span><span>Busta Paga</span></a>
    <a href="/impostazioni.html"><span class="icon">⚙️</span><span>Impostazioni</span></a>
</div></nav>
</body>
</html>
