<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82F6">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Admin – Gestione Turni</title>
<style>
  :root { --bg:#0F172A; --card:#1E293B; --card2:#263348; --border:#334155; --text:#E2E8F0; --muted:#94A3B8; --accent:#3B82F6; --red:#EF4444; --green:#10B981; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; }

  .container { max-width:1000px; margin:28px auto; padding:0 24px; display:flex; flex-direction:column; gap:24px; }
  .section-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .section-head { padding:14px 20px; background:var(--card2); font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); display:flex; justify-content:space-between; align-items:center; }
  .section-body { padding:20px; }

  table { width:100%; border-collapse:collapse; }
  th { padding:10px 14px; font-size:0.75rem; color:var(--muted); text-align:left; border-bottom:1px solid var(--border); font-weight:600; text-transform:uppercase; }
  td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:0.875rem; }
  tr:last-child td { border-bottom:none; }

  .badge-admin { background:rgba(59,130,246,.15); color:#60A5FA; padding:2px 8px; border-radius:4px; font-size:0.75rem; font-weight:700; }
  .badge-user  { background:var(--card2); color:var(--muted); padding:2px 8px; border-radius:4px; font-size:0.75rem; }
  .badge-team-editor { background:rgba(16,185,129,.15); color:#34D399; border:1px solid rgba(16,185,129,.3); padding:2px 8px; border-radius:999px; font-size:0.75rem; font-weight:700; }
  .role-group { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .user-actions { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .btn-role { border:1px solid transparent; }
  .btn-team-role { background:rgba(16,185,129,.15); color:#34D399; border-color:rgba(16,185,129,.3); }
  .btn-team-role:hover { background:#10B981; color:#fff; }

  .btn { padding:6px 14px; border-radius:8px; border:none; cursor:pointer; font-size:0.82rem; font-weight:600; }
  .btn-sm { padding:4px 10px; font-size:0.78rem; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#2563EB; }
  .btn-warn { background:rgba(245,158,11,.15); color:#F59E0B; border:1px solid rgba(245,158,11,.3); }
  .btn-warn:hover { background:#F59E0B; color:white; }
  .btn-danger { background:rgba(239,68,68,.15); color:#FCA5A5; border:1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background:#EF4444; color:white; }
  /* ── TABELLA UTENTI – azioni compatte ── */
  .sec-utenti-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .utenti-table { width:100%; border-collapse:collapse; min-width:680px; table-layout:fixed; }
  .utenti-table col.col-user  { width:130px; }
  .utenti-table col.col-nome  { width:110px; }
  .utenti-table col.col-ruoli { width:140px; }
  .utenti-table col.col-opteam{ width:130px; }
  .utenti-table col.col-azioni{ width:auto; }
  .utenti-table th { padding:9px 12px; font-size:0.72rem; color:var(--muted); text-align:left; border-bottom:1px solid var(--border); font-weight:700; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .utenti-table td { padding:8px 12px; border-bottom:1px solid var(--border); font-size:0.84rem; vertical-align:middle; word-break:break-word; }
  .utenti-table tr:last-child td { border-bottom:none; }
  .utenti-table tr:hover td { background:rgba(255,255,255,.02); }
  .role-group { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .user-actions { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .user-actions .btn { padding:3px 8px; font-size:0.72rem; white-space:nowrap; }
  .op-team-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(16,185,129,.1); color:#6ee7b7; border:1px solid rgba(16,185,129,.22); border-radius:6px; padding:2px 8px; font-size:0.75rem; font-weight:700; word-break:normal; }

  /* ── OPERATOR LINK TABLE ── */
  .op-link-table { width:100%; border-collapse:collapse; font-size:0.83rem; }
  .op-link-table th { padding:9px 14px; font-size:0.7rem; color:var(--muted); text-align:left; border-bottom:1px solid var(--border); font-weight:700; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
  .op-link-table td { padding:8px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .op-link-table tr:last-child td { border-bottom:none; }
  .op-link-table tr:hover td { background:rgba(255,255,255,.02); }
  .op-link-table select { background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:6px 10px; font-size:0.8rem; outline:none; width:100%; min-width:160px; }
  .op-link-table select:focus { border-color:var(--accent); }
  .op-pos-badge { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; background:rgba(59,130,246,.16); color:#93c5fd; font-weight:800; font-size:0.85rem; }
  .soft-note { font-size:0.78rem; color:var(--muted); }
  .pending-box { border:1px solid rgba(16,185,129,.24); border-radius:12px; padding:14px; background:rgba(15,23,42,.34); }
  .pending-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .mini-log { font-size:0.78rem; color:var(--muted); display:flex; flex-direction:column; gap:8px; }
  .mini-log-item { padding:10px 0; border-bottom:1px solid var(--border); }
  .ferie-tools { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .ferie-tools input, .ferie-tools select { background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 10px; font-size:0.8rem; min-height:38px; }
  .ferie-tools input { flex:1 1 220px; }
  .ferie-tools select { flex:0 0 180px; }
  .ferie-grid { display:grid; grid-template-columns:1.2fr 1fr; gap:18px; }
  .ferie-scroll { max-height:420px; overflow-y:auto; padding-right:4px; }
  .ferie-scroll.compact { max-height:500px; }
  .ferie-scroll, .sec-utenti-wrap, .log-scroll, .week-block {
    scrollbar-width:thin;
    scrollbar-color:#475569 transparent;
  }
  .ferie-scroll::-webkit-scrollbar,
  .sec-utenti-wrap::-webkit-scrollbar,
  .log-scroll::-webkit-scrollbar,
  .week-block::-webkit-scrollbar { width:8px; height:8px; }
  .ferie-scroll::-webkit-scrollbar-track,
  .sec-utenti-wrap::-webkit-scrollbar-track,
  .log-scroll::-webkit-scrollbar-track,
  .week-block::-webkit-scrollbar-track { background:transparent; }
  .ferie-scroll::-webkit-scrollbar-thumb,
  .sec-utenti-wrap::-webkit-scrollbar-thumb,
  .log-scroll::-webkit-scrollbar-thumb,
  .week-block::-webkit-scrollbar-thumb { background:#475569; border-radius:999px; }
  .ferie-scroll::-webkit-scrollbar-thumb:hover,
  .sec-utenti-wrap::-webkit-scrollbar-thumb:hover,
  .log-scroll::-webkit-scrollbar-thumb:hover,
  .week-block::-webkit-scrollbar-thumb:hover { background:#64748b; }
  .ferie-status-chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:0.68rem; font-weight:800; }
  .ferie-status-chip.pending { background:rgba(250,204,21,.18); color:#fde68a; border:1px solid rgba(250,204,21,.35); }
  .ferie-status-chip.approved { background:rgba(34,197,94,.16); color:#86efac; border:1px solid rgba(34,197,94,.32); }
  .ferie-status-chip.rejected { background:rgba(239,68,68,.16); color:#fca5a5; border:1px solid rgba(239,68,68,.32); }
  .ferie-status-chip.neutral { background:rgba(148,163,184,.14); color:#cbd5e1; border:1px solid rgba(148,163,184,.24); }

  /* Tabella editor */
  .tab-editor { display:none; }
  .tab-editor.open { display:block; }
  .week-grid { display:grid; grid-template-columns: repeat(7,1fr); gap:6px; margin-bottom:6px; }
  .week-label { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:4px; }
  .week-label span { text-align:center; font-size:0.68rem; color:var(--muted); font-weight:700; text-transform:uppercase; }
  .week-num { font-size:0.72rem; color:var(--muted); margin-bottom:6px; font-weight:700; }
  .week-block { border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; background:var(--card2); }

  .day-cell {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    cursor:pointer; border-radius:8px; padding:6px 2px;
    border:2px solid transparent; transition:all .12s; user-select:none;
    min-height:54px; justify-content:center;
  }
  .day-cell:hover { border-color:rgba(255,255,255,.2); }
  .day-cell.selected { border-color:white; }
  .day-cell .dc-label { font-size:0.65rem; color:rgba(255,255,255,.6); font-weight:700; }
  .day-cell .dc-turno { font-size:0.82rem; font-weight:800; color:white; }
  .day-cell.empty-cell { background:var(--card); border-color:var(--border); }
  .day-cell.empty-cell .dc-turno { color:var(--border); }

  .turno-picker {
    position:fixed; z-index:200; background:var(--card);
    border:1px solid var(--border); border-radius:12px;
    padding:12px; display:flex; flex-wrap:wrap; gap:6px;
    max-width:260px; box-shadow:0 8px 32px rgba(0,0,0,.6);
  }
  .tp-btn {
    padding:6px 10px; border-radius:6px; border:none; cursor:pointer;
    font-size:0.78rem; font-weight:700; color:white; min-width:44px; text-align:center;
  }
  .tp-btn:hover { opacity:.85; }
  .tp-clear { background:var(--card2); color:var(--muted); border:1px solid var(--border); }

  label { display:block; font-size:0.78rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
  input[type=text], input[type=number], select { width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:9px 12px; font-size:0.9rem; outline:none; }
  input:focus, select:focus { border-color:var(--accent); }
  .form-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px; }

  .loading { text-align:center; padding:40px; color:var(--muted); }
  .alert-admin { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#FCA5A5; border-radius:8px; padding:14px; text-align:center; }

  /* ── HEADER ── */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    height: 56px;
    padding: 0 20px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 20;
    flex-shrink: 0;
  }
  .page-title {
    width: 230px; min-width: 230px; max-width: 230px;
    font-size: 1.05rem; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; flex-shrink: 0;
  }
  .page-title span { color: var(--accent); }
  .top-nav { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }
  .top-nav a {
    color: var(--muted); text-decoration: none; font-size: 0.82rem;
    padding: 5px 10px; border-radius: 8px; background: var(--card2);
    white-space: nowrap; line-height: 1; transition: color .15s, background .15s;
  }
  .top-nav a:hover { color: var(--text); background: #2d3f55; }
  .top-nav a.nav-active {
    color: var(--text); background: #2d3f55;
    cursor: default; opacity: 0.85;
    box-shadow: inset 0 0 0 1px var(--border);
  }
  .top-nav a#adminNavLink { display: none; color: #F59E0B; }
  .header-controls { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .header-controls select, .header-controls button {
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 5px 10px;
    font-size: 0.82rem; cursor: pointer; height: 32px;
  }
  .header-controls button:hover { background: var(--accent); border-color: var(--accent); }
  .btn-logout {
    background: rgba(239,68,68,.15); color: #FCA5A5;
    border: 1px solid rgba(239,68,68,.3); border-radius: 8px;
    padding: 5px 12px; font-size: 0.82rem; cursor: pointer;
    height: 32px; white-space: nowrap;
  }
  .btn-logout:hover { background: #EF4444; color: white; }
  .user-label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  @media (max-width: 768px) {
    header { height: 48px; padding: 0 12px; gap: 8px; }
    .page-title { width: auto; min-width: 0; max-width: 160px; font-size: 0.9rem; }
    .top-nav { display: none !important; }
    .user-label { display: none; }
    #userNameLabel { display:none; }
    .header-controls { gap:4px; }
    .header-controls select { display: none; }
    .header-controls button { padding: 4px 8px; font-size: 0.78rem; }
    .btn-logout { padding: 4px 8px; font-size: 0.78rem; }
  }

  /* ── USER DROPDOWN ── */
  .user-menu { position:relative; }
  .user-btn {
    display:flex; align-items:center; gap:6px;
    background:var(--card2); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:5px 10px;
    font-size:0.82rem; cursor:pointer; height:32px;
    transition:background .15s;
  }
  .user-btn:hover { background:#2d3f55; }
  .user-btn .avatar {
    width:20px; height:20px; border-radius:50%;
    background:var(--accent); color:white;
    font-size:0.65rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .user-dropdown {
    display:none; position:absolute; right:0; top:calc(100% + 6px);
    background:var(--card); border:1px solid var(--border);
    border-radius:10px; min-width:200px; z-index:200;
    box-shadow:0 8px 24px rgba(0,0,0,.4); overflow:hidden;
  }
  .user-dropdown.open { display:block; }
  .ud-header {
    padding:12px 14px; background:var(--card2);
    border-bottom:1px solid var(--border);
    font-size:0.78rem; color:var(--muted);
  }
  .ud-header strong { display:block; color:var(--text); font-size:0.9rem; margin-bottom:2px; }
  .ud-item {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px; font-size:0.85rem; cursor:pointer;
    color:var(--text); transition:background .1s;
  }
  .ud-item:hover { background:var(--card2); }
  .ud-item.danger { color:#FCA5A5; }
  .ud-item.danger:hover { background:rgba(239,68,68,.1); }
  .ud-sep { height:1px; background:var(--border); margin:2px 0; }

  /* ── MODAL ACCOUNT ── */
  .acc-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.6); z-index:300;
    align-items:center; justify-content:center;
  }
  .acc-overlay.open { display:flex; }
  .acc-modal {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:28px; width:400px; max-width:95vw;
  }
  .acc-modal h2 { font-size:1rem; font-weight:700; margin-bottom:20px; }
  .acc-field { margin-bottom:14px; }
  .acc-field label {
    display:block; font-size:0.75rem; color:var(--muted);
    font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;
  }
  .acc-field input {
    width:100%; background:var(--card2); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:10px 12px;
    font-size:0.9rem; outline:none; transition:border-color .15s;
  }
  .acc-field input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(59,130,246,.15); }
  .acc-msg { font-size:0.82rem; margin:10px 0; min-height:18px; }
  .acc-actions { display:flex; gap:10px; margin-top:20px; }
  .acc-btn {
    flex:1; padding:10px; border-radius:8px; border:none;
    font-size:0.9rem; font-weight:600; cursor:pointer;
  }
  .acc-btn-primary { background:var(--accent); color:white; }
  .acc-btn-primary:hover { background:#2563EB; }
  .acc-btn-cancel { background:var(--card2); color:var(--muted); border:1px solid var(--border); }

  /* ── STATUS SISTEMA ── */
  .status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .status-item {
    background:var(--card2); border:1px solid var(--border);
    border-radius:10px; padding:18px 16px; text-align:center;
  }
  .status-dot {
    width:11px; height:11px; border-radius:50%;
    display:inline-block; margin-right:6px; vertical-align:middle;
    flex-shrink:0;
  }
  .dot-ok    { background:#10B981; box-shadow:0 0 7px rgba(16,185,129,.7); }
  .dot-warn  { background:#F59E0B; box-shadow:0 0 7px rgba(245,158,11,.7); }
  .dot-error { background:#EF4444; box-shadow:0 0 7px rgba(239,68,68,.7); }
  .dot-loading { background:var(--muted); }
  .status-label { font-size:0.7rem; color:var(--muted); text-transform:uppercase; font-weight:700; letter-spacing:.06em; margin-bottom:10px; }
  .status-row { display:flex; align-items:center; justify-content:center; gap:4px; margin-bottom:4px; }
  .status-value { font-size:1.05rem; font-weight:700; }
  .status-sub   { font-size:0.73rem; color:var(--muted); margin-top:4px; }
  .refresh-btn  {
    font-size:0.75rem; padding:4px 12px; border-radius:6px;
    background:var(--card2); border:1px solid var(--border);
    color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .refresh-btn:hover { color:var(--text); border-color:var(--accent); }

  /* ── LOG ACCESSI ── */
  .log-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
  .log-table th { padding:9px 14px; color:var(--muted); font-size:0.7rem; text-transform:uppercase; border-bottom:1px solid var(--border); text-align:left; font-weight:700; letter-spacing:.04em; }
  .log-table td { padding:9px 14px; border-bottom:1px solid var(--border); }
  .log-table tr:last-child td { border-bottom:none; }
  .log-table tr:hover td { background:rgba(255,255,255,.02); }
  .badge-ok   { background:rgba(16,185,129,.15); color:#34D399; padding:2px 9px; border-radius:4px; font-size:0.72rem; font-weight:700; }
  .badge-fail { background:rgba(239,68,68,.15);  color:#FCA5A5; padding:2px 9px; border-radius:4px; font-size:0.72rem; font-weight:700; }
  .log-scroll { max-height:400px; overflow-y:auto; }
  .log-scroll::-webkit-scrollbar { width:8px; height:8px; }
  .log-scroll::-webkit-scrollbar-thumb { background:#475569; border-radius:999px; }
  .log-scroll::-webkit-scrollbar-track { background:transparent; }

  /* ── BOTTOM NAV MOBILE ── */
  .bottom-nav {
    display:none; position:fixed; bottom:0; left:0; right:0; z-index:50;
    background:var(--card); border-top:1px solid var(--border);
    padding:6px 0 env(safe-area-inset-bottom,8px);
  }
  .bottom-nav-inner { display:flex; justify-content:space-around; align-items:stretch; }
  .bottom-nav a {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--muted); text-decoration:none; font-size:0.65rem;
    font-weight:600; padding:6px 4px; flex:1; text-align:center; min-width:0;
    border-radius:8px; margin:0 2px; transition:color .15s;
  }
  .bottom-nav a.active { color:var(--accent); }
  .bottom-nav a.admin-link { color:#F59E0B !important; }
  .bottom-nav a span.icon { font-size:1.35rem; line-height:1.2; }

  /* ── MOBILE RESPONSIVE ── */
  @media(max-width:768px) {
    body { padding-bottom:72px; }
    .bottom-nav { display:block; }
    .container { padding:0 12px; margin:16px auto; gap:16px; }
    .section-body { padding:12px; }
    .section-head { padding:10px 14px; font-size:0.75rem; }

    /* Status grid: 3 colonne → 1 col su mobile */
    .status-grid { grid-template-columns:1fr; gap:10px; }
    .status-item { padding:14px 12px; display:flex; align-items:center; gap:12px; text-align:left; }
    .status-label { margin-bottom:2px; font-size:0.68rem; }
    .status-row { justify-content:flex-start; margin-bottom:2px; }

    /* Log accessi: nascondi colonne extra, scroll orizzontale */
    .log-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .log-table { min-width:480px; }
    .log-table th, .log-table td { padding:8px 10px; font-size:0.78rem; }

    /* Tabella utenti su mobile */
    table th, table td { padding:8px 10px; font-size:0.8rem; }
    .btn-sm { padding:5px 8px; font-size:0.75rem; }

    /* Form tabelle: 3 col → 1 col */
    .form-row { grid-template-columns:1fr; gap:10px; }

    /* Week grid: scroll orizzontale invece di comprimere */
    .week-block { overflow-x:auto; -webkit-overflow-scrolling:touch; padding:10px; }
    .week-grid { min-width:360px; }
    .week-label { min-width:360px; }
    .day-cell { min-height:44px; padding:4px 1px; }
    .day-cell .dc-turno { font-size:0.72rem; }

<script>
function getToken()  { return localStorage.getItem('token'); }
function getNome()   { return localStorage.getItem('nome') || ''; }
function isAdmin()   { return localStorage.getItem('is_admin') === 'true'; }
function logout()    {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  localStorage.removeItem('nome');
  localStorage.removeItem('is_admin');
  window.location.href='/login.html';
}

const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts={}) {
  const token = getToken();
  if (token && typeof url==='string' && url.startsWith('/api/')) {
    opts.headers = {...(opts.headers||{}), 'Authorization': 'Bearer '+token };
  }
  return _origFetch(url, opts).then(res => {
    if (res.status===401 && url.startsWith('/api/')) { logout(); throw new Error(); }
    return res;
  });
};

const GIORNI = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

let tabelle = [];
let editingTab = null;
let adminFerieData = { pending: [], log: [] };
let adminFerieFilters = { pendingName: '', allName: '', status: 'all' };

function normalizeFerieText(value) {
  return String(value || '').toLowerCase();
}

function getFerieStatusMeta(status) {
  const key = normalizeFerieText(status);
  if (key === 'approved') return { key, label: 'Approvata' };
  if (key === 'rejected') return { key, label: 'Rifiutata' };
  if (key === 'pending') return { key, label: 'In attesa' };
  return { key: 'neutral', label: 'Nessuno stato' };
}

function getFerieStatusLabel(status) {
  if (status === 'approved') return 'accettate';
  if (status === 'rejected') return 'rifiutate';
  if (status === 'pending') return 'richieste';
  return 'trovate';
}

function getFerieActionLabel(action, statusTo) {
  const actionKey = normalizeFerieText(action);
  if (actionKey === 'requested') return 'Richiesta inviata';
  if (actionKey === 'removed') return 'Richiesta rimossa';
  if (actionKey === 'reviewed') {
    const meta = getFerieStatusMeta(statusTo);
    if (meta.key === 'approved') return 'Richiesta approvata';
    if (meta.key === 'rejected') return 'Richiesta rifiutata';
    return 'Richiesta revisionata';
  }
  return 'Aggiornamento richiesta';
}

function renderLogText(text) {
  if (!text) return '-';
  // ~~testo~~ → <del>testo</del> (strikethrough)
  let html = String(text).replace(/~~([^~]+)~~/g, '<del style="color:#94A3B8;text-decoration:line-through">$1</del>');
  return html;
}

function getFerieHistoryLine(row) {
  const fromMeta = getFerieStatusMeta(row.status_from);
  const toMeta = getFerieStatusMeta(row.status_to);
  return `${row.username || '-'} · ${fromMeta.label} → ${toMeta.label} · da ${row.actor_username || '?'}`;
}

function rerenderAdminFerieWithFocus(fieldId, selectionStart, selectionEnd) {
  renderFerieRequests(adminFerieData.pending, adminFerieData.log);
  if (!fieldId) return;
  const field = document.getElementById(fieldId);
  if (!field) return;
  field.focus();
  if (typeof selectionStart === 'number' && typeof selectionEnd === 'number' && field.setSelectionRange) {
    field.setSelectionRange(selectionStart, selectionEnd);
  }
}

function getAdminFerieFilteredData() {
  const pendingNeedle = normalizeFerieText(adminFerieFilters.pendingName);
  const allNeedle = normalizeFerieText(adminFerieFilters.allName);
  const status = adminFerieFilters.status || 'all';
  const pending = (adminFerieData.pending || []).filter(p => {
    if (!pendingNeedle) return true;
    return normalizeFerieText(`${p.operatore_nome} ${p.username}`).includes(pendingNeedle);
  });
  const log = (adminFerieData.log || []).filter(l => {
    const matchesName = !allNeedle || normalizeFerieText(`${l.operatore_nome} ${l.username} ${l.actor_username}`).includes(allNeedle);
    const currentStatus = normalizeFerieText(l.status_to || '');
    const matchesStatus = status === 'all' || currentStatus === status;
    return matchesName && matchesStatus;
  });
  return { pending, log };
}

async function loadStatus() {
  // Reset a loading
  ['site','db','ping'].forEach(k => {
    const dot = document.getElementById(`dot-${k}`);
    if (dot) dot.className = 'status-dot dot-loading';
  });

  const t0 = performance.now();
  let data;
  try {
    data = await fetch('/api/admin/status').then(r => r.json());
  } catch(e) {
    data = { site: 'error', db: 'error', db_ms: -1, db_type: '—' };
  }
  const siteMs = Math.round(performance.now() - t0);

  // Sito
  const siteOk = data.site === 'ok';
  setStatus('site',
    siteOk ? 'ok' : 'error',
    siteOk ? 'Online' : 'Errore',
    `Risposta: ${siteMs} ms`
  );

  // Database
  const dbOk = data.db === 'ok';
  setStatus('db',
    dbOk ? 'ok' : 'error',
    dbOk ? 'Connesso' : 'Errore',
    data.db_type || '—'
  );

  // Latenza DB  
  const ms = data.db_ms;
  const pingClass = ms < 0 ? 'error' : ms < 100 ? 'ok' : ms < 400 ? 'warn' : 'error';
  const pingLabel = ms < 0 ? 'N/A' : ms < 100 ? 'Ottima' : ms < 400 ? 'Lenta' : 'Critica';
  setStatus('ping',
    pingClass,
    ms >= 0 ? `${ms} ms` : 'N/A',
    pingLabel
  );
}

function setStatus(key, cls, value, sub) {
  const dot = document.getElementById(`dot-${key}`);
  const val = document.getElementById(`val-${key}`);
  const s   = document.getElementById(`sub-${key}`);
  if (dot) dot.className = `status-dot dot-${cls}`;
  if (val) val.textContent = value;
  if (s)   s.textContent = sub;
}

async function doCleanup(target, confirmMsg) {
  if (!confirm(confirmMsg)) return;
  const msg = document.getElementById('cleanup-msg');
  msg.textContent = '⏳ Eliminazione in corso...';
  msg.style.color = 'var(--muted)';
  const res = await fetch('/api/admin/db-cleanup', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ target })
  }).then(r=>r.json()).catch(()=>({ok:false, msg:'Errore di rete'}));
  if (res.ok) {
    msg.textContent = '✅ ' + res.msg;
    msg.style.color = '#34D399';
    loadDbStats();
  } else {
    msg.textContent = '❌ ' + (res.detail || res.msg || 'Errore');
    msg.style.color = '#FCA5A5';
  }
  setTimeout(() => { msg.textContent = ''; }, 5000);
}

function parseUA(ua) {
  if (!ua) return '—';
  // Estrai browser e OS leggibili
  let browser = '—', os = '—';
  if (/Chrome\/(\d+)/.test(ua) && !/Edg/.test(ua) && !/OPR/.test(ua)) browser = `Chrome ${RegExp.$1}`;
  else if (/Edg\/(\d+)/.test(ua)) browser = `Edge ${RegExp.$1}`;
  else if (/OPR\/(\d+)/.test(ua)) browser = `Opera ${RegExp.$1}`;
  else if (/Firefox\/(\d+)/.test(ua)) browser = `Firefox ${RegExp.$1}`;
  else if (/Safari\//.test(ua) && /Version\/(\d+)/.test(ua)) browser = `Safari ${RegExp.$1}`;
  else browser = ua.slice(0, 30);

  if (/Windows NT/.test(ua)) os = 'Windows';
  else if (/Mac OS X/.test(ua)) os = 'macOS';
  else if (/iPhone|iPad/.test(ua)) os = 'iOS';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/Linux/.test(ua)) os = 'Linux';

  return `${browser} · ${os}`;
}

const TURNI_COLORS = {
  M:'#1E40AF', M1:'#1D4ED8', M2:'#2563EB', M3:'#3B82F6',
  P:'#B45309', N:'#4338CA', RC:'#065F46', R:'#991B1B',
  ROT:'#5B21B6', RF:'#831843', MAL:'#C2410C', F:'#0F766E',
  'F-P':'#166534', 'F-N':'#1E3A5F'
};
const TURNI_LIST = ['M','M1','M2','M3','P','N','RC','R','ROT','RF','MAL','F','F-P','F-N'];

let editorData = [];

function makeDayCell(sett, giorno, turno) {
  const color = turno ? (TURNI_COLORS[turno] || '#374151') : '';
  const bg = turno ? color : 'var(--card)';
  return `<div class="day-cell ${turno?'':'empty-cell'}" 
    style="background:${bg}" 
    id="dc-${sett}-${giorno}"
    onclick="openPicker(${sett},${giorno},event)">
    <span class="dc-turno">${turno || '—'}</span>
  </div>`;
}

function buildWeeksHtml(numSett) {
  let html = '';
  for (let s = 0; s < numSett; s++) {
    html += `<div class="week-block">
      <div class="week-num">Settimana ${s+1}</div>
      <div class="week-label">${GIORNI.map(g=>`<span>${g}</span>`).join('')}</div>
      <div class="week-grid">
        ${GIORNI.map((_,d) => makeDayCell(s, d, editorData[s]?.[d] || '')).join('')}
      </div>
    </div>`;
  }
  return html;
}

function refreshDayCell(sett, giorno) {
  const el = document.getElementById(`dc-${sett}-${giorno}`);
  if (!el) return;
  const turno = editorData[sett]?.[giorno] || '';
  const color = turno ? (TURNI_COLORS[turno] || '#374151') : '';
  el.style.background = turno ? color : 'var(--card)';
  el.className = `day-cell ${turno?'':'empty-cell'}`;
  el.querySelector('.dc-turno').textContent = turno || '—';
}

let pickerTarget = null;

function openPicker(sett, giorno, evt) {
  closePicker();
  pickerTarget = {sett, giorno};
  const picker = document.createElement('div');
  picker.className = 'turno-picker';
  picker.id = 'turnoPicker';
  picker.innerHTML = TURNI_LIST.map(t =>
    `<button class="tp-btn" style="background:${TURNI_COLORS[t]||'#374151'}" onclick="selectTurno('${t}')">${t}</button>`
  ).join('') + `<button class="tp-btn tp-clear" onclick="selectTurno('')">✕ Vuoto</button>`;
  document.body.appendChild(picker);
  const rect = evt.currentTarget.getBoundingClientRect();
  let top = rect.bottom + 6, left = rect.left;
  if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
  if (top + 200 > window.innerHeight) top = rect.top - 210;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';
  setTimeout(() => document.addEventListener('click', closePicker, {once:true}), 50);
  evt.stopPropagation();
}

function selectTurno(turno) {
  if (!pickerTarget) return;
  const {sett, giorno} = pickerTarget;
  if (!editorData[sett]) editorData[sett] = Array(7).fill('');
  editorData[sett][giorno] = turno;
  refreshDayCell(sett, giorno);
  closePicker();
}

function closePicker() {
  const p = document.getElementById('turnoPicker');
  if (p) p.remove();
  pickerTarget = null;
}

function showEditor(tab) {
  const editor = document.getElementById('tabEditor');
  editor.classList.add('open');

  const turni = tab.turni_json || tab.turni || [];
  editorData = [];
  for (let s = 0; s < numSett; s++) {
    editorData[s] = Array(7).fill('').map((_, d) => (turni[s]?.[d] || '').trim().split(' ')[0] || '');
  }
  editor.innerHTML = `
    <hr style="border-color:var(--border);margin:20px 0">
    <h3 style="margin-bottom:16px;font-size:1rem">${editingTab ? 'Modifica tabella' : 'Nuova tabella'}</h3>

        <option value="telefonisti" ${tab.tipo==='telefonisti'?'selected':''}>📞 Telefonisti (13 sett.)</option>
        <option value="capisala" ${tab.tipo==='capisala'?'selected':''}>👔 Capisala (12 sett.)</option>
      </select></div>
      <div><label>N° settimane</label><input type="number" id="tabNumSett" value="${numSett}" min="1" max="20" onchange="rebuildWeeks()"></div>
    </div>
    <div id="weeksContainer">${buildWeeksHtml(numSett)}</div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-primary" onclick="saveTabella()">💾 Salva tabella</button>
      <button class="btn" style="background:var(--card2);color:var(--muted)" onclick="closeEditor()">Annulla</button>
    </div>`;
}

function updateNumSett() {
  const tipo = document.getElementById('tabTipo').value;
  const n = tipo === 'telefonisti' ? 13 : 12;
  document.getElementById('tabNumSett').value = n;
  rebuildWeeks();
}

function rebuildWeeks() {
  const n = parseInt(document.getElementById('tabNumSett').value) || 13;
  const newData = [];
  for (let s = 0; s < n; s++) {
    newData[s] = editorData[s] || Array(7).fill('');
  }
  editorData = newData;
  document.getElementById('weeksContainer').innerHTML = buildWeeksHtml(n);
}

function getTurniFromEditor() {
  return editorData.map(sett => (sett || Array(7).fill('')));
}

async function saveTabella() {
  const nome = document.getElementById('tabNome').value.trim();
  const tipo = document.getElementById('tabTipo').value;
  const num_settimane = parseInt(document.getElementById('tabNumSett').value);
  if (!nome) { alert('Inserisci un nome per la tabella'); return; }
  const turni = getTurniFromEditor();
  const body = { nome, tipo, num_settimane, turni };
  const url = editingTab ? `/api/admin/tabelle/${editingTab}` : '/api/admin/tabelle';
  const method = editingTab ? 'PUT' : 'POST';
  await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  closeEditor();
  await loadAll();
}

  const ed = document.getElementById('tabEditor');
  if (ed) { ed.classList.remove('open'); ed.innerHTML=''; }
  editingTab = null;

async function doChangePwd(event) {
  event?.preventDefault?.();

  const nw  = document.getElementById('accPwdNew').value;
  const cnf = document.getElementById('accPwdConfirm').value;
  const msg = document.getElementById('accMsg');
  msg.textContent = '';
  if (!old || !nw || !cnf) { msg.textContent='⚠️ Compila tutti i campi'; msg.style.color='#F59E0B'; return; }
  if (nw.length < 6)       { msg.textContent='⚠️ Minimo 6 caratteri'; msg.style.color='#F59E0B'; return; }
  if (nw !== cnf)          { msg.textContent='⚠️ Le password non coincidono'; msg.style.color='#EF4444'; return; }
  const res = await fetch('/api/auth/change-password', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password_attuale: old, nuova_password: nw })
  }).then(r=>r.json()).catch(()=>({ok:false}));
  if (res.ok) {
    msg.textContent='✅ Password cambiata!'; msg.style.color='#34D399';
    setTimeout(closeAccModal, 1500);
  } else {
    msg.textContent='❌ ' + (res.detail||'Password attuale non corretta'); msg.style.color='#EF4444';
  }
}

let pageVisitsLoaded = false;

parseUA = function(ua) {
  if (!ua) return '-';
  let browser = '-';
  let os = '-';
  if (/Chrome\/(\d+)/.test(ua) && !/Edg/.test(ua) && !/OPR/.test(ua)) browser = `Chrome ${RegExp.$1}`;
  else if (/Edg\/(\d+)/.test(ua)) browser = `Edge ${RegExp.$1}`;
  else if (/OPR\/(\d+)/.test(ua)) browser = `Opera ${RegExp.$1}`;
  else if (/Firefox\/(\d+)/.test(ua)) browser = `Firefox ${RegExp.$1}`;
  else if (/Safari\//.test(ua) && /Version\/(\d+)/.test(ua)) browser = `Safari ${RegExp.$1}`;
  else browser = ua.slice(0, 30) || '-';

  if (/Windows NT/.test(ua)) os = 'Windows';
  else if (/Mac OS X/.test(ua)) os = 'macOS';
  else if (/iPhone|iPad/.test(ua)) os = 'iOS';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/Linux/.test(ua)) os = 'Linux';

  return `${browser} - ${os}`;
};

loadPageVisits = async function() {
  const tbody = document.getElementById('visitsTableBody');
  if (!tbody) return;
  pageVisitsLoaded = true;
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">Caricamento...</td></tr>';

  let data;
  try {
    data = await fetch('/api/admin/page-visits').then(r => r.json());
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#FCA5A5;padding:24px">Errore nel caricamento</td></tr>';
    return;
  }

  const nascondiBot = document.getElementById('nascondi-bot')?.checked;
  const filtered = nascondiBot ? data.filter(v => !v.is_bot) : data;
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:24px">Nessuna visita registrata</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(v => {
    const ts = (v.timestamp || '').toString().replace('T', ' ').slice(0, 19);
    const ua = parseUA(v.user_agent || '');
    const referrer = v.referrer
      ? `<span style="font-size:0.78rem;color:var(--muted)">${v.referrer.slice(0,40)}</span>`
      : '<span style="color:var(--border)">diretto</span>';
    const bot = v.is_bot
      ? '<span style="color:#F59E0B;font-size:0.8rem">si</span>'
      : '<span style="color:var(--border)">-</span>';
    return `<tr>
      <td style="color:var(--muted);font-size:0.8rem;white-space:nowrap">${ts}</td>
      <td style="font-family:monospace;font-size:0.78rem;color:var(--muted)">${v.ip_address || '-'}</td>
      <td>${referrer}</td>
      <td style="color:var(--muted);font-size:0.75rem">${ua}</td>
      <td style="text-align:center">${bot}</td>
    </tr>`;
  }).join('');
};

  }
  await Promise.all(tasks);
}

loadDbStats = async function() {
  try {
    const s = await fetch('/api/admin/db-stats').then(r => r.json());
    const set = (id, val) => {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    };
    set('stat-ferie-pending', s.ferie_requests_pending ?? 0);
    set('stat-ferie-processed', s.ferie_requests_processed ?? 0);
    set('stat-ferie-log', s.ferie_log_total ?? 0);
    set('stat-login-visits', s.login_visits_total ?? 0);

    setCleanupButtonState('ferie_closed_history', Number(s.ferie_requests_processed || 0) > 0 || Number(s.ferie_log_total || 0) > 0);
    setCleanupButtonState('ferie_requests_processed', Number(s.ferie_requests_processed || 0) > 0);
    setCleanupButtonState('ferie_requests_all', Number(s.ferie_requests_total || 0) > 0);
    setCleanupButtonState('ferie_log', Number(s.ferie_log_total || 0) > 0);
    setCleanupButtonState('login_visits', Number(s.login_visits_total || 0) > 0);
  } catch (e) {}
};

doCleanup = async function(target, confirmMsg) {
  const btn = document.querySelector(`[data-cleanup-target="${target}"]`);
  if (btn?.disabled) return;
  if (!confirm(confirmMsg)) return;

  const msg = document.getElementById('cleanup-msg');
  if (msg) {
    msg.textContent = 'Pulizia in corso...';
    msg.style.color = 'var(--muted)';
  }
  if (btn) btn.disabled = true;

  const res = await fetch('/api/admin/db-cleanup', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ target })
  }).then(r => r.json()).catch(() => ({ok:false, msg:'Errore di rete'}));

  if (res.ok) {
    if (msg) {
      msg.textContent = res.msg || 'Pulizia completata';
      msg.style.color = '#34D399';
    }
    await refreshCleanupViews(target);
  } else {
    if (msg) {
      msg.textContent = res.detail || res.msg || 'Errore';
      msg.style.color = '#FCA5A5';
    }
    await loadDbStats();
  }

  if (msg) {
    setTimeout(() => { msg.textContent = ''; }, 5000);
  }
};

  const [utenti, tabs, operatoriLinks, feriePending, ferieLog] = await Promise.all([
    fetch('/api/admin/utenti').then(r=>r.json()),
    fetch('/api/admin/tabelle').then(r=>r.json()),
    fetch('/api/admin/team/operatori-links').then(r=>r.json()).catch(()=>[]),
    fetch('/api/admin/team/ferie/pending').then(r=>r.json()).catch(()=>[]),
    fetch('/api/admin/team/ferie/log?limit=120').then(r=>r.json()).catch(()=>[]),
  ]);
  tabelle = tabs;
  renderUtenti(utenti);
  renderOperatorLinks(operatoriLinks, utenti);
  renderFerieRequests(feriePending, ferieLog);
  renderTabelle(tabs);
  loadStatus();
  loadLoginLogs();
  loadDbStats();
};
